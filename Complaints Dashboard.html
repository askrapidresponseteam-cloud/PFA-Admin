  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

idden;text-overflow:ellipsis\">Animal cruelty<\u002Fdiv>\n              <div style=\"flex:1;height:8px;background:rgba(20,20,15,.08)\"><div style=\"width:19%;height:100%;background:#14140F\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"width:34px;text-align:right;font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums\">19%<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px\">\n              <div style=\"width:118px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Neglect / abandonment<\u002Fdiv>\n              <div style=\"flex:1;height:8px;background:rgba(20,20,15,.08)\"><div style=\"width:15%;height:100%;background:#14140F\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"width:34px;text-align:right;font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums\">15%<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <div style=\"width:118px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Wildlife distress<\u002Fdiv>\n              <div style=\"flex:1;height:8px;background:rgba(20,20,15,.08)\"><div style=\"width:8%;height:100%;background:#14140F\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"width:34px;text-align:right;font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums\">8%<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- toast -->\n    <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#14140F;color:#fff;padding:13px 20px;font-size:13.5px;font-weight:600;z-index:80;display:flex;align-items:center;gap:11px;animation:pfaToast .2s ease\">\n        <span style=\"width:18px;height:18px;background:#86C517;color:#14140F;display:grid;place-ite bai, MH', category:'Kennel conditions', priority:'Medium', assignee:'Anita Desai', initials:'AD', status:'Assigned', updated:'1h', mins:60 },\n      { id:'C-2288', complainant:'Sunita Verma', district:'Lucknow, UP', category:'Pet abandonment', priority:'Low', assignee:'Vikram Singh', initials:'VS', status:'In Progress', updated:'2h', mins:120 },\n      { id:'C-2285', complainant:'Imran Khan', district:'New Delhi, DL', category:'Illegal slaughter', priority:'High', assignee:'Meera Rao', initials:'MR', status:'Waiting', updated:'3h', mins:180 },\n      { id:'C-2280', complainant:'Farida Sheikh', district:'Ahmedabad, GJ', category:'Animal neglect', priority:'Medium', assignee:'Sana Kapoor', initials:'SK', status:'In Progress', updated:'5h', mins:300 },\n      { id:'C-2274', complainant:'Public portal', district:'Kochi, KL', category:'Wildlife distress', priority:'Medium', assignee:null, initials:'', status:'New', updated:'6h', mins:360 },\n      { id:'C-2266', complainant:'Deepak Rao', district:'Nagpur, MH', category:'Poisoning', priority:'High', assignee:'Arjun Nair', initials:'AN', status:'In Progress', updated:'8h', mins:480 },\n      { id:'C-2201', complainant:'Ananya Foundation', district:'Bengaluru, KA', category:'Stray overpopulation', priority:'Low', assignee:'Meera Rao', initials:'MR', status:'Resolved', updated:'1d', mins:1440 },\n      { id:'C-2188', complainant:'Latha Menon', district:'Chennai, TN', category:'Injured calf', priority:'Medium', assignee:'Anita Desai', initials:'AD', status:'Resolved', updated:'1d', mins:1500 },\n      { id:'C-2174', complainant:\"Sofia D'Souza\", district:'Panaji, GA', category:'Animal cruelty', priority:'High', assignee:'Vikram Singh', initials:'VS', status:'Assigned', updated:'2d', mins:2880 },\n    ];\n  }\n\n  renderVals(){\n    const P = this.props;\n    const me = (P.currentUser || 'Dr. Meera Rao').replace(/^(Dr\\.?|Mr\\.?|Ms\\.?|Mrs\\.?)\\s+/i,'');\n    const now = new Date();\n    let dateStr;\n    try { dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }\n    catch(e){ dateStr = 'Monday, 6 July 2026'; }\n\n    const defMap = { 'All':'all','Unassigned':'unassigned','Assigned to me':'mine','High priority':'high' };\n    const filter = this.state.filter || defMap[P.defaultTab] || 'all';\n\n    const prioColor = { High:'#B4322C', Medium:'#8A6410', Low:'#4C7A16' };\n    const prioBg = { High:'#F7E4E2', Medium:'#F5EAD0', Low:'#EDF6DC' };\n    const statusColor = { 'New':'#2E6BB0', 'Assigned':'#8A8A7E', 'In Progress':'#C9A227', 'Waiting':'#6A50A8', 'Resolved':'#4C9A2A', 'Closed':'#9C9C92' };\n\n    const data = this.data();\n    const preds = {\n      all: ()=>true,\n      new: c=>c.status==='New',\n      unassigned: c=>!c.assignee,\n      mine: c=>c.assignee===me,\n      pending: c=>c.status==='In Progress'||c.status==='Waiting',\n      high: c=>c.priority==='High',\n      resolved: c=>c.status==='Resolved',\n    };\n    const counts = {};\n    Object.keys(preds).forEach(k=>counts[k]=data.filter(preds[k]).length);\n\n    const tabsDef = [['all','All'],['new','New'],['unassigned','Unassigned'],['mine','Assigned to me'],['pending','Pending'],['high','High priority'],['resolved','Resolved']];\n    const tabs = tabsDef.map(([key,label])=>{\n      const active = filter===key;\n      return { key, label, count: counts[key], onClick:()=>this.setF(key),\n        weight: active?700:500, color: active?'#14140F':'#6B6B62', border: active?'#14140F':'transparent', countColor: active?'#14140F':'#A6A69C' };\n    });\n\n    const q = (this.state.query||'').trim().toLowerCase();\n    const w = { High:3, Medium:2, Low:1 };\n    let rows = data.filter(preds[filter]).filter(c=> !q || (c.id+' '+c.complainant+' '+c.district+' '+c.category).toLowerCase().includes(q));\n    rows = rows.slice().sort((a,b)=> (w[b.priority]-w[a.priority]) || (a.mins-b.mins));\n    const rowsV = rows.map(c=>({\n      id:c.id, complainant:c.complainant, district:c.district, category:c.category, priority:c.priority,\n      prioColor: prioColor[c.priority], prioBg: prioBg[c.priority],\n      statusLabel:c.status, statusColor: statusColor[c.status]||'#9C9C92',\n      assignee:c.assignee||'', initials:c.initials||'', assigned:!!c.assignee, unassigned:!c.assignee, updated:c.updated,\n      onOpen:()=>this.fireToast('Opening complaint #'+c.id),\n      onAssign:(e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.fireToast('#'+c.id+' assigned to you'); },\n    }));\n\n    const f = { all:()=>this.setF('all'), unassigned:()=>this.setF('unassigned'), mine:()=>this.setF('mine'), pending:()=>this.setF('pending'), high:()=>this.setF('high') };\n    const go = {\n      rescues:()=>this.nav('Rescue cases'), members:()=>this.nav('Members'), volunteers:()=>this.nav('Volunteers'),\n      donations:()=>this.nav('Donations'), shelters:()=>this.nav('Shelters'), reports:()=>this.nav('Reports'),\n      settings:()=>this.nav('Settings'), notifications:()=>this.nav('Notifications'), filters:()=>this.nav('Advanced filters'),\n      viewAll:()=>this.nav('Complaint list'), viewLog:()=>this.nav('Activity log'), page:()=>this.nav('More results'),\n      newComplaint:()=>this.fireToast('Opening new complaint form...'), export:()=>this.fireToast('Preparing complaints export...'),\n    };\n\n    return {\n      dateStr, showDeltas: P.showKpiDeltas ?? true,\n      tabs, rows: rowsV, resultCount: rowsV.length,\n      onSearch:(e)=>this.setState({ query: e.target.value }),\n      f, go, toast: this.state.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
